<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>柽宝个人教程站</title>
  <!-- 官方稳定CDN，不会出现加载失败的问题 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <!-- 这个div是页面渲染的核心，绝对不能删！之前的空白页大概率是不小心把它删了 -->
  <div id="app"></div>

  <script>
    // 最基础的配置，零语法错误，保证页面能正常渲染
    window.$docsify = {
      name: '柽宝个人教程站',
      nameLink: '/',
      loadSidebar: true,
      auto2top: true,
      maxLevel: 0,
      subMaxLevel: 0
    }
  </script>

  <!-- 网站核心运行JS，官方稳定链接 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
