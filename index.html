<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>柽宝个人教程站</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '柽宝个人教程站',
      nameLink: '/',
      auto2top: true,
      loadSidebar: true,
      maxLevel: 0,
      subMaxLevel: 0,
      // 全文搜索配置（标题+正文都能搜）
      fullTextSearch: {
        placeholder: '输入关键词搜索',
        noData: '未找到相关内容',
        depth: 6
      },
      // 提交新文章自动刷新，不改变更新频率
      requestHeaders: {
        'Cache-Control': 'no-cache, no-store, must-revalidate',
        'Pragma': 'no-cache'
      },
      alias: {
        '/.*/.md': path => `${path}?t=${new Date().getTime()}`
      }
    }
  </script>

  <!-- Docsify 核心 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>
  <!-- 图片放大 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/zoom-image.min.js"></script>
  <!-- 真正的全文搜索插件（替换官方搜索，支持搜正文） -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-fulltext-search@1.1.0/dist/docsify-fulltext-search.min.js"></script>
</body>
</html>
