<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>柽宝个人教程站</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/themes/vue.css">
  <style>
    /* ========== 核心：彻底清除顶部大空白 ========== */
    body {
      margin: 0;
      padding: 0;
    }
    .sidebar {
      padding-top: 0 !important;
      margin-top: 0 !important;
      background: #f8f9fa;
      border-right: 1px solid #e5e6eb;
    }
    .content {
      padding-top: 10px !important;
      max-width: 960px;
      margin: 0 auto;
    }

    /* ========== 仿飞书紧凑搜索框 ========== */
    .sidebar-search {
      padding: 0px 12px 2px 12px;
      border-bottom: 1px solid #e5e6eb;
      margin-top: 0;
      background: #f8f9fa;
    }
    .sidebar-search input {
      width: 100%;
      height: 28px;
      padding: 0 8px;
      border: 1px solid #e5e6eb;
      border-radius: 4px;
      outline: none;
      font-size: 13px;
      background: #fff;
    }

    /* ========== 压缩标题间距，极致紧凑 ========== */
    .sidebar h1, .sidebar .app-name {
      margin: 0 !important;
      padding: 2px 12px 4px 12px !important;
      line-height: 1.2 !important;
    }

    /* ========== 搜索功能样式 ========== */
    .sidebar-nav li {
      margin: 0;
      padding: 4px 12px;
    }
    .sidebar-nav li.hide-item {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '柽宝个人教程站',
      nameLink: '/',
      loadSidebar: true,
      maxLevel: 2,
      subMaxLevel: 0,

      // 保留文章自动更新，提交即刷新
      requestHeaders: {
        'Cache-Control': 'no-cache, no-store, must-revalidate',
        'Pragma': 'no-cache'
      },
      alias: {
        '/.*/.md': path => `${path}?t=${Date.now()}`
      }
    }
  </script>

  <!-- 仅保留核心JS，无多余插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>

  <script>
    // 纯原生侧边栏标题搜索（无插件）
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const sidebar = document.querySelector('.sidebar');
        if (!sidebar) return;

        const searchHtml = `
          <div class="sidebar-search">
            <input type="text" id="titleSearch" placeholder="搜索文档标题..." oninput="searchTitle()">
          </div>
        `;
        sidebar.insertAdjacentHTML('afterbegin', searchHtml);
      }, 500);
    });

    // 标题搜索逻辑
    function searchTitle() {
      const kw = document.getElementById('titleSearch').value.trim().toLowerCase();
      const items = document.querySelectorAll('.sidebar-nav li');

      items.forEach(item => {
        const text = item.textContent.toLowerCase();
        if (kw === '' || text.includes(kw)) {
          item.classList.remove('hide-item');
        } else {
          item.classList.add('hide-item');
        }
      });
    }
  </script>
</body>
</html>
      });
    }
  </script>
</body>
</html>
