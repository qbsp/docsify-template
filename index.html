<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>柽宝个人教程站</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/themes/vue.css">
  <style>
    /* 侧边栏顶部搜索框 */
    .sidebar-search {
      padding: 10px 15px;
      border-bottom: 1px solid #eee;
    }
    .sidebar-search input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      outline: none;
      font-size: 14px;
    }
    /* 隐藏搜索不到的菜单 */
    .sidebar-nav li.hide-item {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '柽宝个人教程站',
      nameLink: '/',
      // 开启返回顶部按钮（滚动右下角出现）
      auto2top: true,
      // 开启侧边栏
      loadSidebar: true,
      maxLevel: 3,
      subMaxLevel: 1,

      // 文章自动更新，提交即刷新
      requestHeaders: {
        'Cache-Control': 'no-cache, no-store, must-revalidate',
        'Pragma': 'no-cache'
      },
      alias: {
        '/.*/.md': path => `${path}?t=${Date.now()}`
      }
    }
  </script>

  <!-- 核心 JS + 图片放大插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/zoom-image.min.js"></script>

  <script>
    // 侧边栏顶部插入搜索框（只搜标题）
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const sidebar = document.querySelector('.sidebar');
        if (!sidebar) return;

        // 新建搜索框
        const searchHtml = `
          <div class="sidebar-search">
            <input type="text" id="titleSearch" placeholder="搜索标题..." oninput="searchTitle()">
          </div>
        `;
        sidebar.insertAdjacentHTML('afterbegin', searchHtml);
      }, 600);
    });

    // 只搜索侧边栏标题
    function searchTitle() {
      const kw = document.getElementById('titleSearch').value.trim().toLowerCase();
      const items = document.querySelectorAll('.sidebar-nav li');

      items.forEach(item => {
        const text = item.textContent.toLowerCase();
        if (kw === '' || text.includes(kw)) {
          item.classList.remove('hide-item');
        } else {
          item.classList.add('hide-item');
        }
      });
    }
  </script>
</body>
</html>
